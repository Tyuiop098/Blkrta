<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX BLACKLIST</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ปรับแต่งตัวแปรเก็บข้อมูลส่วนกลาง (Polyfill window.storage ให้ทำงานบน LocalStorage ของเว็บเบราวเซอร์ปกติได้)
        if (!window.storage) {
          window.storage = {
            get: async (key) => {
              const val = localStorage.getItem(key);
              return val ? { value: val } : null;
            },
            set: async (key, value) => {
              localStorage.setItem(key, value);
            }
          };
        }

        // ดึง Hooks ที่จำเป็นมาจากตัวแปร Global ของ React
        const { useState, useEffect, useCallback } = React;

        const CREATOR = { username: "YOK0850", password: "YOK135018", role: "creator" };
        const INITIAL_ADMINS = [{ username: "YOK0850", password: "YOK135018", role: "creator" }];

        const STORAGE_KEY_ENTRIES = "rbl_entries";
        const STORAGE_KEY_ADMINS = "rbl_admins";
        
        // Discord Webhook URL ของคุณ
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1510266726065897632/at1jTm-Vi0StPEs60JX8_X_ce-wZtZNhxh5ZoAeaYAc-BGtx9ynln6R7w25kqCuccD_y";

        /* ──────────────── helpers ──────────────── */
        async function loadStorage(key, fallback) {
          try {
            const r = await window.storage.get(key);
            return r ? JSON.parse(r.value) : fallback;
          } catch {
            return fallback;
          }
        }
        async function saveStorage(key, data) {
          try { await window.storage.set(key, JSON.stringify(data)); } catch {}
        }

        // ฟังก์ชันสำหรับส่งข้อมูลหา Discord Webhook ในรูปแบบ Embed สวยงาม
        async function sendDiscordWebhook(embedData) {
          try {
            await fetch(DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                embeds: [{
                  timestamp: new Date().toISOString(),
                  ...embedData
                }]
              })
            });
          } catch (err) {
            console.error("ไม่สามารถส่งข้อมูลไปที่ Discord ได้:", err);
          }
        }

        /* ──────────────── icons (inline SVG) ──────────────── */
        const Icon = {
          home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
          search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
          users: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 0 7.75"/></svg>,
          lock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
          plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
          trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
          logout: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
          shield: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
          star: <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
        };

        /* ──────────────── styles ──────────────── */
        const css = `
          @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap');

          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

          :root {
            --gold-light: #FFD700;
            --gold:       #D4A017;
            --gold-dark:  #9A7209;
            --red:        #C0392B;
            --red-dark:   #7B1A0E;
            --red-light:  #E74C3C;
            --cream:      #FFF8EE;
            --cream-deep: #F5E6C8;
            --text:       #2C1810;
            --text-muted: #7A5C3E;
            --border:     #D4A01766;
            --shadow:     rgba(158, 100, 10, 0.18);
          }

          body { background: var(--cream); font-family: 'Crimson Pro', serif; color: var(--text); min-height: 100vh; }

          .app { min-height: 100vh; display: flex; flex-direction: column; }

          /* ── header ── */
          .header {
            background: linear-gradient(135deg, var(--red-dark) 0%, #5A1008 40%, #3D0B06 100%);
            border-bottom: 3px solid var(--gold);
            padding: 0 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky; top: 0; z-index: 100;
          }
          .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 70px; gap: 16px; }
          .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
          .logo-icon { font-size: 28px; filter: drop-shadow(0 0 6px var(--gold)); }
          .logo-text { font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.4rem; color: var(--gold-light); letter-spacing: 2px; text-transform: uppercase; line-height: 1; }
          .logo-sub { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }

          /* ── nav ── */
          .nav { display: flex; align-items: center; gap: 4px; }
          .nav-btn {
            display: flex; align-items: center; gap: 6px; padding: 8px 14px;
            background: transparent; border: 1px solid transparent;
            color: #F5D78A; font-family: 'Cinzel', serif; font-size: 0.75rem;
            letter-spacing: 1px; cursor: pointer; border-radius: 4px;
            transition: all .2s; text-transform: uppercase;
          }
          .nav-btn:hover { background: rgba(255,215,0,0.1); border-color: var(--gold-dark); color: var(--gold-light); }
          .nav-btn.active { background: rgba(255,215,0,0.15); border-color: var(--gold); color: var(--gold-light); }
          .nav-btn.login-btn { background: var(--gold-dark); color: var(--red-dark); border-color: var(--gold); font-weight: 700; }
          .nav-btn.login-btn:hover { background: var(--gold-light); }
          .nav-btn.logout-btn { color: #F5856A; border-color: var(--red-light); }
          .nav-btn.logout-btn:hover { background: rgba(231,76,60,0.1); }

          .user-badge { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); padding: 4px 10px; border: 1px solid var(--gold-dark); border-radius: 3px; letter-spacing: 1px; }

          /* ── main ── */
          .main { flex: 1; max-width: 1100px; margin: 0 auto; padding: 32px 24px; width: 100%; }

          /* ── page titles ── */
          .page-title { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 700; color: var(--red-dark); text-align: center; margin-bottom: 8px; }
          .page-sub { text-align: center; color: var(--text-muted); font-size: 1.05rem; margin-bottom: 32px; }
          .gold-line { width: 80px; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 12px auto 28px; }

          /* ── home ── */
          .home-hero {
            background: linear-gradient(135deg, var(--red-dark) 0%, #8B1A10 100%);
            border: 2px solid var(--gold-dark); border-radius: 12px; padding: 48px 32px; text-align: center; margin-bottom: 32px; box-shadow: 0 8px 32px var(--shadow); position: relative; overflow: hidden;
          }
          .home-hero::before {
            content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(255,215,0,0.03) 30px, rgba(255,215,0,0.03) 31px);
          }
          .hero-title { font-family: 'Cinzel', serif; font-size: 2.8rem; font-weight: 900; color: var(--gold-light); text-shadow: 0 2px 12px rgba(0,0,0,0.5); margin-bottom: 12px; position: relative; }
          .hero-sub { color: #F5D78A; font-size: 1.15rem; max-width: 560px; margin: 0 auto 24px; position: relative; }
          .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,215,0,0.15); border: 1px solid var(--gold); padding: 6px 16px; border-radius: 20px; color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 2px; }

          .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
          .stat-card {
            background: white; border: 2px solid var(--border); border-radius: 10px; padding: 24px; text-align: center; box-shadow: 0 2px 12px var(--shadow); transition: transform .2s, box-shadow .2s;
          }
          .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
          .stat-num { font-family: 'Cinzel', serif; font-size: 2.5rem; font-weight: 900; color: var(--red); line-height: 1; }
          .stat-label { font-size: 0.9rem; color: var(--text-muted); margin-top: 6px; letter-spacing: 1px; }

          /* ── search ── */
          .search-bar-wrap { position: relative; max-width: 560px; margin: 0 auto 28px; }
          .search-input {
            width: 100%; padding: 14px 52px 14px 20px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Crimson Pro', serif; font-size: 1.1rem; background: white; color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s;
          }
          .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,160,23,0.15); }
          .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--gold); pointer-events: none; }

          /* ── table ── */
          .table-wrap { background: white; border: 2px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px var(--shadow); }
          .bl-table { width: 100%; border-collapse: collapse; }
          .bl-table th { background: linear-gradient(135deg, var(--red-dark), #6B1108); color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 14px 16px; text-align: left; }
          .bl-table td { padding: 13px 16px; border-bottom: 1px solid var(--cream-deep); font-size: 0.98rem; vertical-align: middle; }
          .bl-table tr:last-child td { border-bottom: none; }
          .bl-table tr:hover td { background: #FFF5E4; }
          .bl-table tr:nth-child(even) td { background: #FEFAF2; }
          .bl-table tr:nth-child(even):hover td { background: #FFF5E4; }

          .name-cell { font-weight: 600; color: var(--red-dark); font-family: 'Cinzel', serif; font-size: 0.9rem; }
          .rank-badge { display: inline-block; background: var(--cream-deep); border: 1px solid var(--gold-dark); color: var(--gold-dark); padding: 2px 10px; border-radius: 12px; font-size: 0.82rem; font-family: 'Cinzel', serif; }
          .punish-text { color: var(--red); font-weight: 600; }
          .date-text { color: var(--text-muted); font-size: 0.88rem; white-space: nowrap; }
          .delete-btn { background: none; border: 1px solid #F5C6C2; color: var(--red-light); padding: 5px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; transition: all .2s; }
          .delete-btn:hover { background: #FDECEA; border-color: var(--red); }

          .empty-state { text-align: center; padding: 48px; color: var(--text-muted); font-size: 1.1rem; }
          .empty-icon { font-size: 3rem; margin-bottom: 12px; }

          /* ── form card ── */
          .form-card { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 28px; box-shadow: 0 2px 16px var(--shadow); }
          .form-card-title { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--red-dark); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
          .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
          .form-group { display: flex; flex-direction: column; gap: 6px; }
          .form-group.full { grid-column: 1/-1; }
          .form-label { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600; color: var(--gold-dark); letter-spacing: 1.5px; text-transform: uppercase; }
          .form-input, .form-select, .form-textarea { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 6px; font-family: 'Crimson Pro', serif; font-size: 1rem; color: var(--text); background: var(--cream); outline: none; transition: border-color .2s; }
          .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); background: white; }
          .form-textarea { resize: vertical; min-height: 70px; }

          .btn-primary {
            display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--red-dark), var(--red)); color: var(--gold-light); border: 2px solid var(--gold-dark); padding: 11px 24px; border-radius: 6px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; transition: all .2s; box-shadow: 0 2px 8px var(--shadow);
          }
          .btn-primary:hover { background: linear-gradient(135deg, var(--red), #D44030); transform: translateY(-1px); box-shadow: 0 4px 14px var(--shadow); }
          .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: var(--cream-deep); color: var(--red-dark); border: 2px solid var(--gold-dark); padding: 11px 24px; border-radius: 6px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; transition: all .2s; }
          .btn-secondary:hover { background: var(--gold-light); }

          /* ── login modal ── */
          .modal-backdrop { position: fixed; inset: 0; background: rgba(30,5,0,0.65); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
          .modal { background: var(--cream); border: 2px solid var(--gold); border-radius: 14px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 16px 48px rgba(0,0,0,0.35); animation: modalIn .25s ease; }
          @keyframes modalIn { from { opacity: 0; transform: translateY(-20px) scale(.97); } to { opacity: 1; transform: none; } }
          .modal-title { font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 900; color: var(--red-dark); text-align: center; margin-bottom: 6px; }
          .modal-sub { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-size: 0.95rem; }
          .modal .form-group { margin-bottom: 16px; }
          .modal-error { background: #FDECEA; border: 1px solid var(--red-light); color: var(--red-dark); padding: 10px 14px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 16px; }
          .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.5rem; }
          .modal-wrap { position: relative; }
          .cancel-link { background: none; border: none; color: var(--text-muted); cursor: pointer; font-family: 'Crimson Pro', serif; font-size: 0.95rem; text-decoration: underline; margin-top: 12px; }

          /* ── admin table ── */
          .admin-card { background: white; border: 2px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px var(--shadow); }
          .admin-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--cream-deep); }
          .admin-row:last-child { border-bottom: none; }
          .admin-name { font-family: 'Cinzel', serif; font-size: 0.9rem; color: var(--red-dark); font-weight: 600; }
          .admin-role { font-size: 0.82rem; color: var(--text-muted); }
          .creator-badge { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); color: white; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-family: 'Cinzel', serif; }

          /* ── alert ── */
          .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 0.95rem; }
          .alert-success { background: #EAFAF1; border: 1px solid #27AE60; color: #1D7A42; }
          .alert-error { background: #FDECEA; border: 1px solid var(--red-light); color: var(--red-dark); }

          /* ── footer ── */
          .footer { background: linear-gradient(135deg, var(--red-dark), #3D0B06); border-top: 2px solid var(--gold-dark); padding: 20px; text-align: center; }
          .footer-text { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold-dark); letter-spacing: 2px; text-transform: uppercase; }

          @media (max-width: 640px) {
            .header-inner { flex-wrap: wrap; height: auto; padding: 12px 0; gap: 8px; }
            .nav { flex-wrap: wrap; justify-content: center; gap: 4px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stats-grid .stat-card:last-child { grid-column: 1/-1; }
            .form-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 1.8rem; }
            .bl-table { font-size: 0.85rem; }
            .bl-table th, .bl-table td { padding: 10px 10px; }
          }
        `;

        function App() {
          const [page, setPage] = useState("home");
          const [entries, setEntries] = useState([]);
          const [admins, setAdmins] = useState(INITIAL_ADMINS);
          const [user, setUser] = useState(null);
          const [showLogin, setShowLogin] = useState(false);
          const [loading, setLoading] = useState(true);

          /* load persistent data */
          useEffect(() => {
            (async () => {
              const e = await loadStorage(STORAGE_KEY_ENTRIES, []);
              const a = await loadStorage(STORAGE_KEY_ADMINS, INITIAL_ADMINS);
              setEntries(e);
              setAdmins(a);
              setLoading(false);
            })();
          }, []);

          const persistEntries = useCallback(async (data) => {
            setEntries(data);
            await saveStorage(STORAGE_KEY_ENTRIES, data);
          }, []);

          const persistAdmins = useCallback(async (data) => {
            setAdmins(data);
            await saveStorage(STORAGE_KEY_ADMINS, data);
          }, []);

          const logout = () => setUser(null);

          if (loading) return (
            <div style={{ display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Cinzel',serif",color:"#9A7209",fontSize:"1.2rem" }}>
              กำลังโหลด...
            </div>
          );

          return (
            <>
              <style>{css}</style>
              <div className="app">
                {/* ── Header ── */}
                <header className="header">
                  <div className="header-inner">
                    <div className="logo">
                      <span className="logo-icon">🛡️</span>
                      <div>
                        <div className="logo-text">ROBLOX BLACKLIST</div>
                        <div className="logo-sub">ระบบจัดการบัญชีดำ</div>
                      </div>
                    </div>
                    <nav className="nav">
                      <button className={`nav-btn ${page==="home"?"active":""}`} onClick={()=>setPage("home")}>{Icon.home} หน้าแรก</button>
                      <button className={`nav-btn ${page==="search"?"active":""}`} onClick={()=>setPage("search")}>{Icon.search} ค้นหาชื่อ</button>
                      <button className={`nav-btn ${page==="admins"?"active":""}`} onClick={()=>setPage("admins")}>{Icon.users} ค้นหาแอดมิน</button>
                      {user ? (
                        <>
                          <span className="user-badge">{Icon.star} {user.username}</span>
                          <button className="nav-btn logout-btn" onClick={logout}>{Icon.logout} ออก</button>
                        </>
                      ) : (
                        <button className="nav-btn login-btn" onClick={()=>setShowLogin(true)}>{Icon.lock} เข้าสู่ระบบ</button>
                      )}
                    </nav>
                  </div>
                </header>

                {/* ── Modal Login ── */}
                {showLogin && (
                  <LoginModal admins={admins} onLogin={(u)=>{ setUser(u); setShowLogin(false); }} onClose={()=>setShowLogin(false)} />
                )}

                {/* ── Main ── */}
                <main className="main">
                  {page==="home" && <HomePage entries={entries} user={user} setPage={setPage} />}
                  {page==="search" && <SearchPage entries={entries} user={user} persistEntries={persistEntries} />}
                  {page==="admins" && <AdminsPage admins={admins} user={user} persistAdmins={persistAdmins} />}
                </main>

                <footer className="footer">
                  <div className="footer-text">© ROBLOX BLACKLIST SYSTEM · ผู้สร้างระบบ: YOK0850 · ข้อมูลเป็นความลับ</div>
                </footer>
              </div>
            </>
          );
        }

        /* ──────────────── Login Modal ──────────────── */
        function LoginModal({ admins, onLogin, onClose }) {
          const [username, setUsername] = useState("");
          const [password, setPassword] = useState("");
          const [error, setError] = useState("");

          const handle = () => {
            const found = admins.find(a => a.username === username.trim() && a.password === password);
            if (found) { onLogin(found); }
            else { setError("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"); }
          };

          return (
            <div className="modal-backdrop" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
              <div className="modal modal-wrap">
                <div className="modal-title">{Icon.shield} เข้าสู่ระบบ</div>
                <div className="modal-sub">สำหรับแอดมินและผู้สร้างระบบ</div>
                {error && <div className="modal-error">{error}</div>}
                <div className="form-group">
                  <label className="form-label">ชื่อผู้ใช้</label>
                  <input className="form-input" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="กรอกชื่อผู้ใช้" />
                </div>
                <div className="form-group" style={{marginBottom:"20px"}}>
                  <label className="form-label">รหัสผ่าน</label>
                  <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="กรอกรหัสผ่าน" />
                </div>
                <button className="btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={handle}>{Icon.lock} เข้าสู่ระบบ</button>
                <div style={{textAlign:"center",marginTop:"12px"}}>
                  <button className="cancel-link" onClick={onClose}>ยกเลิก</button>
                </div>
              </div>
            </div>
          );
        }

        /* ──────────────── Home Page ──────────────── */
        function HomePage({ entries, user, setPage }) {
          const recentEntries = [...entries].sort((a,b)=>new Date(b.addedAt)-new Date(a.addedAt)).slice(0,5);
          return (
            <div>
              <div className="home-hero">
                <div className="hero-title">🛡️ ระบบบัญชีดำ ROBLOX</div>
                <div className="hero-sub">ระบบตรวจสอบและจัดการรายชื่อผู้เล่นที่ถูกแบนหรือมีประวัติไม่ดี</div>
                <div className="hero-badge">{Icon.star} ROBLOX BLACKLIST OFFICIAL SYSTEM</div>
              </div>

              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-num">{entries.length}</div>
                  <div className="stat-label">รายชื่อในบัญชีดำ</div>
                </div>
                <div className="stat-card">
                  <div className="stat-num" style={{color:"var(--gold-dark)"}}>24/7</div>
                  <div className="stat-label">พร้อมใช้งานตลอดเวลา</div>
                </div>
                <div className="stat-card">
                  <div className="stat-num" style={{color:"var(--red)"}}>🔒</div>
                  <div className="stat-label">ระบบปลอดภัย</div>
                </div>
              </div>

              {recentEntries.length > 0 && (
                <>
                  <div className="page-title" style={{fontSize:"1.4rem",textAlign:"left",marginBottom:"4px"}}>รายชื่อล่าสุด</div>
                  <div className="gold-line" style={{margin:"8px 0 16px"}} />
                  <div className="table-wrap">
                    <table className="bl-table">
                      <thead><tr><th>ชื่อในเกม</th><th>ยศ</th><th>โทษ</th><th>วันที่</th></tr></thead>
                      <tbody>
                        {recentEntries.map(e=>(
                          <tr key={e.id}>
                            <td><span className="name-cell">{e.gameName}</span></td>
                            <td><span className="rank-badge">{e.rank}</span></td>
                            <td><span className="punish-text">{e.punishment}</span></td>
                            <td><span className="date-text">{e.date}</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{textAlign:"center",marginTop:"16px"}}>
                    <button className="btn-secondary" onClick={()=>setPage("search")}>{Icon.search} ดูรายชื่อทั้งหมด</button>
                  </div>
                </>
              )}

              {!user && (
                <div style={{textAlign:"center",marginTop:"32px",padding:"20px",background:"#FFF5E4",border:"1px solid var(--border)",borderRadius:"10px"}}>
                  <div style={{fontFamily:"'Cinzel',serif",color:"var(--gold-dark)",marginBottom:"6px",fontSize:"1rem"}}>⚠️ โหมดอ่านอย่างเดียว</div>
                  <div style={{color:"var(--text-muted)"}}>เข้าสู่ระบบเพื่อเพิ่ม/แก้ไขข้อมูลในบัญชีดำ</div>
                </div>
              )}
            </div>
          );
        }

        /* ──────────────── Search Page ──────────────── */
        function SearchPage({ entries, user, persistEntries }) {
          const [query, setQuery] = useState("");
          const [alert, setAlert] = useState(null);
          const [form, setForm] = useState({ gameName:"", rank:"", date:"", punishment:"", notes:"" });

          const filtered = query.trim()
            ? entries.filter(e => e.gameName.toLowerCase().includes(query.toLowerCase()) || e.notes?.toLowerCase().includes(query.toLowerCase()))
            : entries;

          const showAlert = (msg, type="success") => {
            setAlert({msg, type});
            setTimeout(()=>setAlert(null), 3000);
          };

          const addEntry = () => {
            if (!form.gameName.trim() || !form.rank.trim() || !form.date || !form.punishment.trim()) {
              showAlert("กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน", "error");
              return;
            }
            const newEntry = { id: Date.now().toString(), ...form, addedBy: user.username, addedAt: new Date().toISOString() };
            persistEntries([...entries, newEntry]);
            
            // ส่งแจ้งเตือนไปยัง Discord เมื่อเพิ่มรายชื่อสำเร็จ
            sendDiscordWebhook({
              title: "➕ มีการเพิ่มรายชื่อในบัญชีดำใหม่",
              color: 12590123, // สีแดงส้ม
              fields: [
                { name: "👤 ชื่อในเกม (Roblox)", value: form.gameName, inline: true },
                { name: "🎖️ ยศ", value: form.rank, inline: true },
                { name: "📅 วันที่ลงบัญชีดำ", value: form.date, inline: true },
                { name: "🔨 โทษที่ได้รับ", value: form.punishment, inline: true },
                { name: "📝 หมายเหตุ", value: form.notes || "-", inline: false },
                { name: "🛡️ แอดมินผู้บันทึก", value: user.username, inline: true }
              ]
            });

            setForm({ gameName:"", rank:"", date:"", punishment:"", notes:"" });
            showAlert("เพิ่มรายชื่อสำเร็จแล้ว");
          };

          const deleteEntry = (id) => {
            const entryToDelete = entries.find(e => e.id === id);
            if (!entryToDelete) return;
            if (!window.confirm("ยืนยันการลบรายชื่อนี้?")) return;
            
            persistEntries(entries.filter(e=>e.id!==id));

            // ส่งแจ้งเตือนไปยัง Discord เมื่อลบรายชื่อออก
            sendDiscordWebhook({
              title: "🗑️ มีการลบรายชื่อออกจากบัญชีดำ",
              color: 15158332, // สีแดงสว่าง
              fields: [
                { name: "👤 ชื่อในเกม (Roblox)", value: entryToDelete.gameName, inline: true },
                { name: "🔨 โทษเดิม", value: entryToDelete.punishment, inline: true },
                { name: "🛡️ ดำเนินการลบโดย", value: user.username, inline: true }
              ]
            });

            showAlert("ลบรายชื่อสำเร็จแล้ว");
          };

          return (
            <div>
              <div className="page-title">ค้นหารายชื่อในบัญชีดำ</div>
              <div className="page-sub">ค้นหาชื่อผู้เล่นที่ถูกบันทึกในระบบบัญชีดำ</div>
              <div className="gold-line" />

              {alert && <div className={`alert alert-${alert.type}`}>{alert.msg}</div>}

              {user && (
                <div className="form-card">
                  <div className="form-card-title">{Icon.plus} เพิ่มรายชื่อใหม่</div>
                  <div className="form-grid">
                    <div className="form-group">
                      <label className="form-label">ชื่อในเกม *</label>
                      <input className="form-input" placeholder="ชื่อผู้เล่นใน Roblox" value={form.gameName} onChange={e=>setForm({...form,gameName:e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">ยศ *</label>
                      <input className="form-input" placeholder="เช่น VIP, Member, Guest" value={form.rank} onChange={e=>setForm({...form,rank:e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">วันที่ลงบัญชีดำ *</label>
                      <input className="form-input" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">โทษ *</label>
                      <input className="form-input" placeholder="เช่น แบน, เตือน, เนรเทศ" value={form.punishment} onChange={e=>setForm({...form,punishment:e.target.value})} />
                    </div>
                    <div className="form-group full">
                      <label className="form-label">หมายเหตุ</label>
                      <textarea className="form-textarea" placeholder="รายละเอียดเพิ่มเติม..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} />
                    </div>
                  </div>
                  <div style={{marginTop:"16px"}}>
                    <button className="btn-primary" onClick={addEntry}>{Icon.plus} บันทึกข้อมูล</button>
                  </div>
                </div>
              )}

              <div className="search-bar-wrap">
                <input className="search-input" placeholder="🔍 ค้นหาชื่อในเกม..." value={query} onChange={e=>setQuery(e.target.value)} />
              </div>

              <div className="table-wrap">
                {filtered.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-icon">🔍</div>
                    <div>{query ? "ไม่พบรายชื่อที่ค้นหา" : "ยังไม่มีรายชื่อในบัญชีดำ"}</div>
                  </div>
                ) : (
                  <table className="bl-table">
                    <thead>
                      <tr>
                        <th>ชื่อในเกม</th>
                        <th>ยศ</th>
                        <th>วันที่</th>
                        <th>โทษ</th>
                        <th>หมายเหตุ</th>
                        {user && <th>จัดการ</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map(e=>(
                        <tr key={e.id}>
                          <td><span className="name-cell">{e.gameName}</span></td>
                          <td><span className="rank-badge">{e.rank}</span></td>
                          <td><span className="date-text">{e.date}</span></td>
                          <td><span className="punish-text">{e.punishment}</span></td>
                          <td style={{maxWidth:"200px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.notes || "-"}</td>
                          {user && <td><button className="delete-btn" onClick={()=>deleteEntry(e.id)}>{Icon.trash}</button></td>}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
              <div style={{color:"var(--text-muted)",fontSize:"0.85rem",marginTop:"8px",textAlign:"right"}}>
                แสดง {filtered.length} จาก {entries.length} รายชื่อ
              </div>
            </div>
          );
        }

        /* ──────────────── Admins Page ──────────────── */
        function AdminsPage({ admins, user, persistAdmins }) {
          const [form, setForm] = useState({ username:"", password:"" });
          const [alert, setAlert] = useState(null);
          const [searchQ, setSearchQ] = useState("");

          const showAlert = (msg, type="success") => {
            setAlert({msg, type});
            setTimeout(()=>setAlert(null), 3000);
          };

          const addAdmin = () => {
            if (!form.username.trim() || !form.password.trim()) { showAlert("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน","error"); return; }
            if (admins.find(a=>a.username===form.username.trim())) { showAlert("ชื่อผู้ใช้นี้มีอยู่แล้ว","error"); return; }
            const newAdmin = { username: form.username.trim(), password: form.password, role: "admin" };
            persistAdmins([...admins, newAdmin]);
            setForm({ username:"", password:"" });
            showAlert("เพิ่มแอดมินสำเร็จแล้ว");
          };

          const deleteAdmin = (username) => {
            if (username === "YOK0850") { showAlert("ไม่สามารถลบผู้สร้างระบบได้","error"); return; }
            if (!window.confirm(`ยืนยันการลบแอดมิน ${username}?`)) return;
            persistAdmins(admins.filter(a=>a.username!==username));
            showAlert("ลบแอดมินสำเร็จแล้ว");
          };

          const filtered = searchQ.trim() ? admins.filter(a=>a.username.toLowerCase().includes(searchQ.toLowerCase())) : admins;
          const isCreator = user?.username === "YOK0850" || user?.role === "creator";

          return (
            <div>
              <div className="page-title">แอดมินระบบ</div>
              <div className="page-sub">รายชื่อแอดมินและผู้ดูแลระบบบัญชีดำ</div>
              <div className="gold-line" />

              {alert && <div className={`alert alert-${alert.type}`}>{alert.msg}</div>}

              {isCreator && (
                <div className="form-card">
                  <div className="form-card-title">{Icon.plus} เพิ่มแอดมินใหม่</div>
                  <div className="form-grid">
                    <div className="form-group">
                      <label className="form-label">ชื่อผู้ใช้แอดมิน</label>
                      <input className="form-input" placeholder="ชื่อผู้ใช้" value={form.username} onChange={e=>setForm({...form,username:e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">รหัสผ่าน</label>
                      <input className="form-input" type="password" placeholder="รหัสผ่าน" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} />
                    </div>
                  </div>
                  <div style={{marginTop:"16px"}}>
                    <button className="btn-primary" onClick={addAdmin}>{Icon.plus} เพิ่มแอดมิน</button>
                  </div>
                </div>
              )}

              <div className="search-bar-wrap">
                <input className="search-input" placeholder="🔍 ค้นหาชื่อแอดมิน..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} />
              </div>

              <div className="admin-card">
                {filtered.length === 0 ? (
                  <div className="empty-state"><div className="empty-icon">👤</div><div>ไม่พบแอดมิน</div></div>
                ) : filtered.map(a=>(
                  <div className="admin-row" key={a.username}>
                    <div>
                      <div className="admin-name">{a.username}</div>
                      <div className="admin-role">{a.role === "creator" ? "ผู้สร้างระบบ" : "แอดมิน"}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                      {a.role==="creator"
                        ? <span className="creator-badge">{Icon.star} ผู้สร้าง</span>
                        : <span style={{fontFamily:"'Cinzel',serif",fontSize:"0.75rem",color:"var(--gold-dark)",background:"var(--cream-deep)",border:"1px solid var(--border)",padding:"3px 10px",borderRadius:"12px"}}>แอดมิน</span>
                      }
                      {isCreator && a.username !== "YOK0850" && (
                        <button className="delete-btn" onClick={()=>deleteAdmin(a.username)}>{Icon.trash}</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>

              <div style={{color:"var(--text-muted)",fontSize:"0.85rem",marginTop:"8px",textAlign:"right"}}>
                แอดมินทั้งหมด {admins.length} คน
              </div>
            </div>
          );
        }

        // เรนเดอร์ Component ลง DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
